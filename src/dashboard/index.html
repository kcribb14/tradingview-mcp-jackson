<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F&G Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b0e11;color:#eaecef;font-size:13px}
.hdr{background:#181a20;border-bottom:1px solid #2b2f36;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.hdr h1{font-size:18px;font-weight:700}.hdr h1 span{color:#f0b90b}
.hdr-r{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.hdr input{background:#1e2329;border:1px solid #2b2f36;color:#eaecef;padding:5px 10px;border-radius:4px;font-size:12px;width:280px}
.btn{background:#2b2f36;border:1px solid #363a45;color:#eaecef;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:.15s}
.btn:hover{background:#363a45}.btn.active{background:#f0b90b;border-color:#f0b90b;color:#181a20;font-weight:600}
.btn-g{background:#0ecb81;border-color:#0ecb81;color:#181a20;font-weight:600}
.tf-bar{position:sticky;top:0;z-index:20;background:#0b0e11;border-bottom:1px solid #2b2f36;display:flex;gap:4px;padding:6px 20px;justify-content:center}
.tf-btn{padding:10px 20px;font-size:13px;font-weight:500;border-radius:6px;min-width:70px;text-align:center;cursor:pointer;border:1px solid #363a45;background:#2b3139;color:#848e9c;transition:.15s}
.tf-btn:hover{border-color:#5e6673;color:#eaecef}.tf-btn.active{background:#f0b90b;border-color:#f0b90b;color:#181a20;font-weight:700}
.tf-btn .cnt{font-size:10px;opacity:.6;margin-left:3px}
.main{display:flex;gap:0;flex-wrap:wrap}.sidebar{width:240px;padding:12px;display:flex;flex-direction:column;gap:8px;border-right:1px solid #2b2f36;background:#181a20}
.chart-area{flex:1;min-width:0}.chart-box{position:relative;height:420px;background:#181a20;border-bottom:1px solid #2b2f36}
.chart-box canvas{position:absolute;top:0;left:0}
.card{background:#1e2329;border:1px solid #2b2f36;border-radius:6px;padding:12px}
.card-t{font-size:10px;color:#848e9c;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.card-v{font-size:28px;font-weight:700}
.card-bar{height:5px;border-radius:3px;margin-top:6px;position:relative;overflow:hidden}
.card-bar-bg{position:absolute;inset:0;background:linear-gradient(to right,#0ecb81,#f0b90b,#f6465d)}
.card-bar-th{position:absolute;top:-3px;width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #181a20;transform:translateX(-50%)}
.card-lb{display:flex;justify-content:space-between;font-size:9px;color:#848e9c;margin-top:2px}
.card-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #2b2f36;font-size:11px}.card-row:last-child{border:none}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.cat-bar{display:flex;gap:3px;padding:6px 20px;background:#0b0e11;overflow-x:auto;border-bottom:1px solid #2b2f36}
.cat-bar .btn{font-size:11px;padding:3px 8px;white-space:nowrap}.cat-bar .cnt{color:#848e9c;margin-left:2px;font-size:9px}
.filters{display:flex;gap:8px;padding:6px 20px;align-items:center;flex-wrap:wrap}
.filters input{background:#1e2329;border:1px solid #2b2f36;color:#eaecef;padding:5px 10px;border-radius:4px;font-size:12px;width:180px}
.filters label{font-size:11px;color:#848e9c;cursor:pointer}
table{width:100%;border-collapse:collapse}
thead th{background:#181a20;color:#848e9c;text-align:left;padding:6px 10px;cursor:pointer;white-space:nowrap;border-bottom:1px solid #2b2f36;position:sticky;top:0;z-index:1;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.3px}
thead th:hover{color:#eaecef}tbody tr{border-bottom:1px solid #1e2329}tbody tr:hover{background:#161b22}
td{padding:5px 10px;white-space:nowrap}.sym{font-weight:600;cursor:pointer;color:#eaecef}
.fg{display:inline-block;padding:2px 8px;border-radius:3px;font-weight:600;font-size:11px;min-width:44px;text-align:center;color:#fff}
.z0{background:#910000}.z1{background:#ff5252}.z2{background:#ff9800}.z2b{background:#c8b86a}.z3{background:#A19F8F}.z4{background:#65a095}.z5{background:#50b050}.z6{background:#2e8f2e}.z7{background:#006400}
.sw{padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600}
.sw-e{background:#0ecb81;color:#181a20}.sw-w{background:#f0b90b;color:#181a20}.sw-x{background:#f6465d;color:#fff}
.star{cursor:pointer;font-size:14px;color:#363a45}.star:hover,.star.on{color:#f0b90b}
.pager{padding:6px 20px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#848e9c;border-top:1px solid #2b2f36}
.status{padding:4px 20px;font-size:10px;color:#5e6673;border-top:1px solid #2b2f36;text-align:center}
/* Detail modal */
.dm-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.dm-bg.open{display:flex}
.dm{background:#181a20;border:1px solid #2b2f36;border-radius:10px;width:90vw;max-width:960px;height:72vh;display:flex;flex-direction:column}
.dm-h{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #2b2f36}
.dm-h h2{font-size:16px;display:flex;align-items:center;gap:8px}
.dm-top{flex:2;min-height:0;position:relative}.dm-bot{flex:1;min-height:0;border-top:1px solid #2b2f36;position:relative}
.dm-top>div,.dm-bot canvas{width:100%!important;height:100%!important}
.dm-close{background:none;border:none;color:#848e9c;font-size:18px;cursor:pointer}
@media(max-width:768px){.sidebar{width:100%;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid #2b2f36}.sidebar .card{min-width:160px}.chart-box{height:300px}.hm{display:none}}
</style>
</head>
<body>

<div class="hdr">
  <div><h1>F&G <span>Scanner</span></h1><span id="meta" style="font-size:11px;color:#848e9c">Loading...</span></div>
  <div class="hdr-r">
    <input id="addInput" placeholder="DexScreener URL or contract...">
    <button class="btn" onclick="addToken()">+ Add</button>
    <button class="btn btn-g" onclick="refresh()">⟳</button>
  </div>
</div>
<div class="tf-bar" id="tfBar"></div>
<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="chart-area"><div class="chart-box"><canvas id="scatter"></canvas></div></div>
</div>
<div class="cat-bar" id="catBar"></div>
<div class="filters">
  <input id="search" placeholder="Search symbol..." oninput="renderTable()">
  <button class="btn" onclick="applyPreset('fear')">Fear</button>
  <button class="btn" onclick="applyPreset('extreme')">Extreme</button>
  <button class="btn" onclick="applyPreset('entry')">Entry Zones</button>
  <button class="btn" onclick="applyPreset('greed')">Greed</button>
  <button class="btn" onclick="applyPreset('clear')">Clear</button>
</div>
<div style="overflow-x:auto"><table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table></div>
<div class="pager" id="pager"></div>
<div class="status" id="statusBar">Connecting...</div>

<!-- Detail Modal -->
<div class="dm-bg" id="dmBg" onclick="if(event.target===this)closeDM()">
  <div class="dm">
    <div class="dm-h">
      <h2><span id="dmSym">—</span><span class="fg z3" id="dmFG">—</span><span class="star" id="dmStar" onclick="toggleFavDM()">☆</span></h2>
      <div style="display:flex;gap:6px;align-items:center">
        <span id="dmPrice" style="font-size:12px;color:#848e9c">—</span>
        <button class="btn" onclick="openInTV()" style="font-size:10px;padding:3px 8px">Open in TV</button>
        <button class="dm-close" onclick="closeDM()">✕</button>
      </div>
    </div>
    <div class="dm-top" id="dmTop"><div id="tvContainer" style="width:100%;height:100%"></div></div>
    <div class="dm-bot"><canvas id="dmFGChart"></canvas></div>
  </div>
</div>

<script>
Chart.register(ChartDataLabels);

let D={symbols:[],stats:{},categories:[],tfCounts:{}},chart=null,cTF='Daily',cCat=null,sCol='f',sDir=1,curPage=1,pageSize=100;
let FAVS=[],showWL=false,filters={fg_max:null,swing:null},dmSym=null,dmFGChart=null;
const TFS=['Daily','15m','1H','4H','Weekly'];
const tfKey={Daily:'f','15m':'f1','1H':'fh','4H':'f4',Weekly:'fw'};

function fmt$(v){if(v>=1e12)return'$'+(v/1e12).toFixed(1)+'T';if(v>=1e9)return'$'+(v/1e9).toFixed(1)+'B';if(v>=1e6)return'$'+(v/1e6).toFixed(0)+'M';return'$'+Math.round(v)}
function fgCls(v){return v<-41?'z0':v<-25?'z1':v<-10?'z2':v<-5?'z2b':v<5?'z3':v<10?'z4':v<41?'z5':v<73?'z6':'z7'}
function fgBadge(v){if(v==null)return'<span style="color:#5e6673">—</span>';return'<span class="fg '+fgCls(v)+'">'+(v>0?'+':'')+v.toFixed(1)+'</span>'}
function fgColor(v){return v<-41?'#910000':v<-25?'#ff5252':v<-10?'#ff9800':v<-5?'#c8b86a':v<5?'#A19F8F':v<10?'#65a095':v<41?'#50b050':v<73?'#2e8f2e':'#006400'}
function zone(v){return v>=73?'Euphoria':v>=41?'Thrill':v>=10?'Excitement':v>=5?'Optimism':v>=-5?'Balanced':v>=-10?'Anxiety':v>=-25?'Fear':v>=-41?'Panic':'Despondency'}

async function loadFavs(){try{FAVS=await(await fetch('/api/watchlist')).json()}catch{FAVS=[]}}

async function loadPage(page){
  const cat=cCat?'&category='+encodeURIComponent(cCat):'';
  const r=await fetch('/api/cached?page='+page+'&limit='+pageSize+'&sort='+sCol+'&order='+(sDir===1?'asc':'desc')+cat);
  const d=await r.json();
  D.stats=d.stats||{};D.categories=d.categories||[];D.tfCounts=d.tfCounts||{};D.updated=d.updated;
  D.symbols=d.symbols||[];D.total=d.total;D.pages=d.pages;curPage=d.page;
  render();
}

async function loadScatter(){
  const cat=cCat?'?category='+encodeURIComponent(cCat):'';
  try{const r=await fetch('/api/scatter'+cat);D.scatterDots=await r.json()}catch{D.scatterDots=[]}
  renderScatter();
}

function render(){
  const s=D.stats;
  document.getElementById('meta').textContent=
    (s.total||0).toLocaleString()+' symbols · '+cTF+' · '+(D.updated?new Date(D.updated).toLocaleTimeString():'');
  renderSidebar();renderTFBar();renderCatBar();renderTable();
  document.getElementById('statusBar').textContent=
    'Connected | '+(s.total||0)+' symbols | Updated: '+(D.updated?new Date(D.updated).toLocaleTimeString():'never');
}

function renderSidebar(){
  const s=D.stats;const avgFG=s.avgFG||0;
  const tp=Math.max(0,Math.min(100,(avgFG+50)/100*100));
  const ac=avgFG<=-15?'#f6465d':avgFG<=-5?'#e65100':avgFG>=15?'#0ecb81':avgFG>=5?'#2e8f2e':'#848e9c';
  const pF=s.total>0?Math.round(s.oversold/(s.total)*100):0;
  // Key assets
  let kaHtml='';
  if(D.keyAssets?.length>0){
    kaHtml='<div class="card"><div class="card-t">Market Overview</div>';
    for(const a of D.keyAssets){
      const dc=fgColor(a.f);
      kaHtml+='<div class="card-row" style="cursor:pointer" onclick="openDM(\''+a.s+'\')"><span>'+a.s+'</span><span style="display:flex;gap:6px;align-items:center"><span>$'+(a.p>=1?a.p.toFixed(0):a.p.toFixed(2))+'</span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+dc+'"></span><span style="font-size:10px;color:'+dc+'">'+(a.f>0?'+':'')+a.f.toFixed(0)+'</span></span></div>';
    }
    kaHtml+='</div>';
  }

  // Signals summary
  const sig=D.signals||{};
  const sigHtml='<div class="card"><div class="card-t">Signals</div>'+
    '<div class="card-row" style="cursor:pointer" onclick="applyPreset(\'entry\')"><span>Entry Zones</span><span style="color:#0ecb81;font-weight:600">'+(sig.entry||0)+'</span></div>'+
    '<div class="card-row"><span>Watching</span><span style="color:#f0b90b">'+(sig.watching||0)+'</span></div>'+
    '<div class="card-row"><span>Exit / Take Profit</span><span style="color:#f6465d">'+(sig.exit||0)+'</span></div></div>';

  document.getElementById('sidebar').innerHTML=
    '<div class="card"><div class="card-t">Avg F&G ('+cTF+')</div><div class="card-v" style="color:'+ac+'">'+(avgFG>0?'+':'')+avgFG+'</div>'+
    '<div class="card-bar"><div class="card-bar-bg"></div><div class="card-bar-th" style="left:'+tp+'%"></div></div><div class="card-lb"><span>Fear</span><span>Greed</span></div></div>'+
    kaHtml+sigHtml;
}

function renderTFBar(){
  const tc=D.tfCounts||{};
  document.getElementById('tfBar').innerHTML=TFS.map(tf=>{
    const n=tc[tf]||0;const a=tf===cTF;const dim=tf!=='Daily'&&n===0;
    return'<button class="tf-btn '+(a?'active':'')+'" style="'+(dim?'opacity:.35;pointer-events:none':'')+'" onclick="switchTF(\''+tf+'\')">'+tf+'<span class="cnt">('+n+')</span></button>';
  }).join('');
}

function renderCatBar(){
  let h='<button class="btn '+(!cCat&&!showWL?'active':'')+'" onclick="showWL=false;switchCat(\'\')">All<span class="cnt">'+D.total+'</span></button>';
  h+='<button class="btn '+(showWL?'active':'')+'" onclick="toggleWL()">★<span class="cnt">'+FAVS.length+'</span></button>';
  for(const c of D.categories)h+='<button class="btn '+(c.name===cCat?'active':'')+'" onclick="showWL=false;switchCat(\''+c.name+'\')">'+c.name+'<span class="cnt">'+c.count+'</span></button>';
  document.getElementById('catBar').innerHTML=h;
}

function renderScatter(){
  const canvas=document.getElementById('scatter');
  const ct=canvas.parentElement;canvas.width=ct.clientWidth;canvas.height=ct.clientHeight;
  const dots=(D.scatterDots||[]).filter(r=>r.m>0);
  const fk=tfKey[cTF]||'f';
  // Labels: top by mcap + extremes. Limit total to avoid overlap.
  const labelSet=new Set();
  const maxLabels=Math.min(25, Math.ceil(dots.length*0.05));
  [...dots].sort((a,b)=>b.m-a.m).slice(0,Math.ceil(maxLabels*0.4)).forEach(d=>labelSet.add(d.s));
  const sorted2=[...dots].sort((a,b)=>(a[fk]??a.f)-(b[fk]??b.f));
  sorted2.slice(0,Math.ceil(maxLabels*0.3)).forEach(d=>labelSet.add(d.s)); // Most fearful
  sorted2.slice(-Math.ceil(maxLabels*0.3)).forEach(d=>labelSet.add(d.s)); // Most greedy
  const data=dots.map(r=>({x:r.m,y:r[fk]??r.f,label:r.s,show:labelSet.has(r.s)}));

  // Auto-scale axes to fit data with padding
  const mcaps=data.map(d=>d.x).filter(v=>v>0);
  const fgs=data.map(d=>d.y).filter(v=>v!=null&&isFinite(v));
  const xMin=mcaps.length>0?Math.max(1e5,Math.min(...mcaps)*0.3):1e7;
  const xMax=mcaps.length>0?Math.max(...mcaps)*2:3e12;
  const fgMin=fgs.length>0?Math.min(...fgs):0;
  const fgMax=fgs.length>0?Math.max(...fgs):0;
  const yPad=Math.max(10,(fgMax-fgMin)*0.15);
  const yMin=Math.floor(fgMin-yPad);
  const yMax=Math.ceil(fgMax+yPad);

  if(chart)chart.destroy();
  chart=new Chart(canvas,{type:'scatter',data:{datasets:[{
    data:data.map(d=>({x:d.x,y:d.y})),
    pointBackgroundColor:data.map(d=>d.y<=-25?'#0ecb81':d.y<=-10?'#26a17b':d.y>=25?'#f6465d':d.y>=10?'#cf304a':'#6b7280'),
    pointBorderColor:'transparent',pointRadius:data.map(d=>d.x>1e11?8:d.x>1e10?5:d.x>1e9?4:d.x>1e8?3:2),pointHoverRadius:8,
    datalabels:{display:ctx=>data[ctx.dataIndex].show,color:'#eaecef',font:{size:9,weight:'bold'},anchor:'end',align:'top',offset:1,formatter:(v,ctx)=>data[ctx.dataIndex].label,textStrokeColor:'#0b0e11',textStrokeWidth:2}
  }]},options:{responsive:false,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{
    title:ctx=>data[ctx[0].dataIndex].label,label:ctx=>['F&G: '+(ctx.raw.y>0?'+':'')+ctx.raw.y.toFixed(1),'MCap: '+fmt$(ctx.raw.x)]
  },backgroundColor:'#1e2329',borderColor:'#2b2f36',borderWidth:1,titleColor:'#f0b90b',bodyColor:'#eaecef'}},
  scales:{x:{type:'logarithmic',reverse:true,min:xMin,max:xMax,grid:{color:'#1e232960'},ticks:{color:'#848e9c',callback:v=>fmt$(v),maxTicksLimit:7},title:{display:true,text:'Market Cap',color:'#5e6673',font:{size:10}}},
  y:{min:yMin,max:yMax,grid:{color:'#1e232940'},ticks:{color:'#848e9c',callback:v=>(v>0?'+':'')+v},title:{display:true,text:'F&G ('+cTF+')',color:'#5e6673',font:{size:10}}}}},
  plugins:[{id:'bg',beforeDraw(ch){const ctx2=ch.ctx;const{top,bottom,left,right}=ch.chartArea;const yS=ch.scales.y;
    for(const[f,t,c]of[[73,90,'rgba(0,100,0,.2)'],[41,73,'rgba(46,143,46,.12)'],[10,41,'rgba(80,176,80,.06)'],[5,10,'rgba(101,160,149,.04)'],[-5,5,'rgba(161,159,143,.04)'],[-10,-5,'rgba(200,184,106,.04)'],[-25,-10,'rgba(255,152,0,.06)'],[-41,-25,'rgba(255,82,82,.12)'],[-60,-41,'rgba(145,0,0,.2)']]){
      ctx2.fillStyle=c;ctx2.fillRect(left,yS.getPixelForValue(t),right-left,yS.getPixelForValue(f)-yS.getPixelForValue(t))}
    ctx2.fillStyle='rgba(234,236,239,.18)';ctx2.font='9px -apple-system,sans-serif';ctx2.textAlign='right';
    for(const[y,t]of[[80,'Euphoria'],[55,'Thrill'],[0,'Balanced'],[-33,'Panic'],[-50,'Despondency']])ctx2.fillText(t,right-4,yS.getPixelForValue(y)+3)}}]});
}

function renderTable(){
  let rows=[...D.symbols];
  const q=(document.getElementById('search')?.value||'').toUpperCase();
  if(q)rows=rows.filter(r=>r.s.includes(q));
  if(showWL)rows=rows.filter(r=>FAVS.includes(r.s));
  if(document.getElementById('fearOnly')?.checked)rows=rows.filter(r=>r.f<=-5);
  if(filters.fg_max!=null)rows=rows.filter(r=>r.f<=filters.fg_max);
  if(filters.fg_min!=null)rows=rows.filter(r=>r.f>=filters.fg_min);
  if(filters.swing)rows=rows.filter(r=>r.w===filters.swing);

  const fk=tfKey[cTF]||'f';
  const cols=[
    {k:'',l:'★',w:'30px'},{k:'',l:'#',w:'35px'},{k:'s',l:'Name',S:1},{k:'p',l:'Price',S:1},
    {k:'m',l:'Market Cap',S:1,h:1},{k:'f',l:'F&G Daily',S:1},{k:'f1',l:'15m',S:1,h:1},
    {k:'fh',l:'1H',S:1,h:1},{k:'f4',l:'4H',S:1,h:1},{k:'fw',l:'Wk',S:1,h:1},
    {k:'z',l:'Zone'},{k:'',l:'Trend'},{k:'w',l:'Signal'}
  ];
  const ar=k=>sCol===k?(sDir===1?' ▲':' ▼'):'';
  document.getElementById('thead').innerHTML=cols.map(c=>{
    const active=c.k===fk;
    return'<th'+(c.S?' onclick="doSort(\''+c.k+'\')"':'')+(c.h?' class="hm"':'')
      +' style="'+(active?'color:#f0b90b;':'')+(c.w?'width:'+c.w:'')+'">'+c.l+(c.S?ar(c.k):'')+'</th>';
  }).join('');

  const pageStart=(curPage-1)*pageSize;
  document.getElementById('tbody').innerHTML=rows.map((r,i)=>{
    const isFav=FAVS.includes(r.s);
    const pr=r.p>=1?'$'+r.p.toFixed(2):r.p>0.001?'$'+r.p.toFixed(4):r.p>0?'$'+r.p.toExponential(2):'—';
    const sw=r.w==='ENTRY ZONE'?'<span class="sw sw-e">ENTRY</span>':r.w==='WATCHING'?'<span class="sw sw-w">WATCH</span>':r.w==='EXIT ZONE'||r.w==='TAKE PROFIT'?'<span class="sw sw-x">EXIT</span>':'';
    return'<tr style="cursor:pointer" onclick="openDM(\''+r.s+'\',\''+r.c+'\')">'+
      '<td onclick="event.stopPropagation()"><span class="star '+(isFav?'on':'')+'" onclick="toggleFav(\''+r.s+'\',event)">'+(isFav?'★':'☆')+'</span></td>'+
      '<td style="color:#848e9c">'+(pageStart+i+1)+'</td>'+
      '<td class="sym">'+r.s+'<span style="color:#5e6673;font-weight:400;margin-left:4px;font-size:10px">'+r.c+'</span></td>'+
      '<td>'+pr+'</td>'+
      '<td class="hm" style="color:#848e9c">'+fmt$(r.m)+'</td>'+
      '<td>'+fgBadge(r.f)+'</td>'+
      '<td class="hm">'+fgBadge(r.f1)+'</td><td class="hm">'+fgBadge(r.fh)+'</td>'+
      '<td class="hm">'+fgBadge(r.f4)+'</td><td class="hm">'+fgBadge(r.fw)+'</td>'+
      '<td style="font-size:10px;color:#848e9c">'+zone(r.f)+'</td>'+
      '<td><canvas class="sparkline" width="60" height="20" data-spark="'+(r.spark||[]).join(',')+'"></canvas></td>'+
      '<td>'+sw+'</td></tr>';
  }).join('');

  // Draw sparklines
  document.querySelectorAll('canvas.sparkline').forEach(cv=>{
    const raw=cv.dataset.spark;if(!raw)return;
    const pts=raw.split(',').map(Number).filter(v=>!isNaN(v));
    if(pts.length<2){cv.style.opacity='0.3';return}
    const ctx=cv.getContext('2d');
    const w=cv.width,h=cv.height,pad=2;
    const mn=Math.min(...pts),mx=Math.max(...pts);
    const rng=mx-mn||1;
    ctx.clearRect(0,0,w,h);
    ctx.beginPath();
    pts.forEach((v,j)=>{
      const x=pad+j*(w-2*pad)/(pts.length-1);
      const y=h-pad-(v-mn)/rng*(h-2*pad);
      j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    const last=pts[pts.length-1],first=pts[0];
    ctx.strokeStyle=last>first?'#0ecb81':last<first?'#f6465d':'#848e9c';
    ctx.lineWidth=1.5;ctx.stroke();
  });

  const tp=D.pages||1;
  let pgHtml='<button class="btn" onclick="goPage(-1)" '+(curPage<=1?'disabled':'')+' style="font-size:11px">◀</button>';
  // Show page numbers: first, current±2, last
  const pages=new Set([1]);
  for(let p=Math.max(1,curPage-2);p<=Math.min(tp,curPage+2);p++)pages.add(p);
  pages.add(tp);
  let last=0;
  for(const p of[...pages].sort((a,b)=>a-b)){
    if(p-last>1)pgHtml+='<span style="color:#5e6673;padding:0 4px">…</span>';
    pgHtml+='<button class="btn'+(p===curPage?' active':'')+'" onclick="goTo('+p+')" style="font-size:11px;padding:3px 8px;min-width:28px">'+p+'</button>';
    last=p;
  }
  pgHtml+='<button class="btn" onclick="goPage(1)" '+(curPage>=tp?'disabled':'')+' style="font-size:11px">▶</button>';
  pgHtml+=' <select onchange="pageSize=+this.value;loadPage(1)" style="background:#2b3139;color:#eaecef;border:1px solid #363a45;border-radius:3px;font-size:11px;padding:2px">';
  for(const sz of[50,100,200,500])pgHtml+='<option value="'+sz+'"'+(sz===pageSize?' selected':'')+'>'+sz+'/page</option>';
  pgHtml+='</select>';
  document.getElementById('pager').innerHTML=
    '<span style="font-size:11px">Showing '+(pageStart+1)+'-'+Math.min(pageStart+rows.length,D.total||0)+' of '+(D.total||0)+'</span><span>'+pgHtml+'</span>';
}

function goPage(d){curPage=Math.max(1,Math.min(D.pages||1,curPage+d));loadPage(curPage)}
function goTo(p){curPage=p;loadPage(p)}
function doSort(c){if(!c)return;if(sCol===c)sDir*=-1;else{sCol=c;sDir=c==='f'||c==='m'?1:-1};loadPage(1)}
function switchTF(tf){cTF=tf;sCol=tfKey[tf]||'f';loadPage(1);loadScatter()}
function switchCat(c){cCat=c||null;loadPage(1);loadScatter()}
function toggleWL(){showWL=!showWL;cCat=null;renderTable();renderCatBar()}
function applyPreset(p){filters={fg_max:null,fg_min:null,swing:null};
  if(p==='fear')filters.fg_max=-10;
  if(p==='extreme')filters.fg_max=-30;
  if(p==='entry')filters.swing='ENTRY ZONE';
  if(p==='greed')filters.fg_min=25;
  renderTable()}
async function refresh(){await loadPage(curPage);loadScatter()}
async function toggleFav(s,ev){ev?.stopPropagation();if(FAVS.includes(s)){FAVS=FAVS.filter(x=>x!==s);fetch('/api/watchlist/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:s})})}else{FAVS.push(s);fetch('/api/watchlist/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:s})})}renderTable();renderCatBar()}

// Detail modal
function mapTV(sym,cat){
  if(cat?.includes('DEX'))return null;
  if(sym.endsWith('.AX'))return'ASX:'+sym.replace('.AX','');
  if(sym.endsWith('.L'))return'LSE:'+sym.replace('.L','');
  if(sym==='GC=F')return'TVC:GOLD';if(sym==='SI=F')return'TVC:SILVER';if(sym==='CL=F')return'TVC:USOIL';
  if(sym.includes('='))return null;if(sym.startsWith('^'))return null;
  const cm=new Set(['BTC','ETH','SOL','XRP','BNB','ADA','DOGE','AVAX','DOT','LINK','SHIB','UNI','AAVE','LTC','NEAR','ATOM']);
  if(cm.has(sym))return'BINANCE:'+sym+'USDT';
  if(cat?.includes('Crypto'))return'BINANCE:'+sym+'USDT';
  return sym;
}

async function openDM(sym,cat){
  dmSym=sym;document.getElementById('dmBg').classList.add('open');
  document.getElementById('dmSym').textContent=sym;document.getElementById('dmPrice').textContent='...';
  document.getElementById('dmStar').className='star '+(FAVS.includes(sym)?'on':'');document.getElementById('dmStar').textContent=FAVS.includes(sym)?'★':'☆';
  const tvSym=mapTV(sym,cat);const container=document.getElementById('tvContainer');container.innerHTML='';
  if(tvSym&&typeof TradingView!=='undefined'){try{new TradingView.widget({container_id:'tvContainer',symbol:tvSym,interval:'D',theme:'dark',style:'1',locale:'en',toolbar_bg:'#181a20',enable_publishing:false,allow_symbol_change:true,width:'100%',height:'100%',backgroundColor:'#181a20'})}catch{container.innerHTML='<div style="padding:20px;color:#848e9c;text-align:center">Widget unavailable</div>'}}else{container.innerHTML='<div style="padding:20px;color:#848e9c;text-align:center">Chart unavailable for DEX token</div>'}
  try{const r=await fetch('/api/history/'+encodeURIComponent(sym));const d=await r.json();
    if(d.current){document.getElementById('dmPrice').textContent=d.current.price>=1?'$'+d.current.price.toFixed(2):'$'+d.current.price.toFixed(6);
      const fc=fgCls(d.current.fg);document.getElementById('dmFG').className='fg '+fc;document.getElementById('dmFG').textContent=(d.current.fg>0?'+':'')+d.current.fg.toFixed(1)}
    if(d.fg?.length>0){if(dmFGChart)dmFGChart.destroy();
      const fv=d.fg.map(x=>x.v),fl=d.fg.map(x=>new Date(x.t).toLocaleDateString()),pv=d.ohlcv?.map(b=>b.c)||[];
      const ds=[{data:fv,yAxisID:'y',segment:{borderColor:ctx=>{const v2=ctx.p1?.parsed?.y??0;return fgColor(v2)}},borderWidth:2,pointRadius:0,fill:false}];
      if(pv.length===fv.length)ds.push({data:pv,yAxisID:'y1',borderColor:'rgba(240,185,11,.3)',borderWidth:1,pointRadius:0,fill:false});
      dmFGChart=new Chart(document.getElementById('dmFGChart'),{type:'line',data:{labels:fl,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},datalabels:{display:false},tooltip:{callbacks:{label:ctx=>ctx.datasetIndex===0?'F&G: '+ctx.raw.toFixed(1):'$'+ctx.raw.toFixed(2)}}},scales:{x:{display:true,grid:{display:false},ticks:{color:'#848e9c',maxTicksLimit:6,font:{size:9}}},y:{position:'right',grid:{color:'#1e232930'},ticks:{color:'#848e9c',font:{size:9}}},y1:{position:'left',grid:{display:false},ticks:{color:'#f0b90b40',font:{size:9}}}}}})}}catch{}
}
function closeDM(){document.getElementById('dmBg').classList.remove('open');document.getElementById('tvContainer').innerHTML=''}
function toggleFavDM(){if(!dmSym)return;toggleFav(dmSym);document.getElementById('dmStar').className='star '+(FAVS.includes(dmSym)?'on':'');document.getElementById('dmStar').textContent=FAVS.includes(dmSym)?'★':'☆'}
async function openInTV(){if(dmSym)fetch('/api/open-in-tv',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:dmSym})})}
async function addToken(){const v=document.getElementById('addInput').value.trim();if(!v)return;document.getElementById('addInput').value='Adding...';try{const r=await fetch('/api/add-token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:v})});const d=await r.json();document.getElementById('addInput').value='';if(d.token)alert('Added: '+d.token.symbol);else alert(d.error||'Failed');refresh()}catch(e){document.getElementById('addInput').value=v;alert(e.message)}}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='/'){e.preventDefault();document.getElementById('search').focus()}
  if(e.key==='Escape')closeDM();
  if(e.key==='f')applyPreset('fear');
  if(e.key==='e')applyPreset('extreme');
  if(e.key==='w')toggleWL();
  if(e.key==='c')applyPreset('clear');
  if(e.key==='ArrowLeft')goPage(-1);
  if(e.key==='ArrowRight')goPage(1);
  if(e.key>='1'&&e.key<='5'){const tfs2=['Daily','15m','1H','4H','Weekly'];switchTF(tfs2[+e.key-1])}
});

// Boot
window.addEventListener('resize',()=>{if(D.scatterDots)renderScatter()});
(async()=>{await loadFavs();await loadPage(1);loadScatter()})();
</script>
